worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 10M;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 1000;

  # Docker DNS resolver (lazy upstream resolution)
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ─── HTTP → HTTPS redirect ──────────────────────────────────────────────────
  server {
    listen 80;
    server_name 37-27-253-42.nip.io api.37-27-253-42.nip.io;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── API (api.37-27-253-42.nip.io) ─────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name api.37-27-253-42.nip.io;

    ssl_certificate     /etc/letsencrypt/live/37-27-253-42.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/37-27-253-42.nip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # AmoCRM webhooks — без rate limit (доверенный источник)
    location /api/v1/webhooks/ {
      set $upstream_backend http://backend:3000;
      proxy_pass         $upstream_backend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # OAuth callback
    location /api/v1/oauth/ {
      limit_req zone=auth burst=10 nodelay;
      set $upstream_backend http://backend:3000;
      proxy_pass         $upstream_backend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SSE стриминг (AI chat) — увеличенные таймауты
    location /api/v1/ai/ {
      limit_req zone=api burst=20 nodelay;
      set $upstream_backend http://backend:3000;
      proxy_pass             $upstream_backend;
      proxy_set_header       Host $host;
      proxy_set_header       X-Real-IP $remote_addr;
      proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header       X-Forwarded-Proto $scheme;
      proxy_read_timeout     300s;
      proxy_send_timeout     300s;
      proxy_buffering        off;
      proxy_cache            off;
      proxy_set_header       Connection '';
      chunked_transfer_encoding on;
    }

    # Все остальные API запросы
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      set $upstream_backend http://backend:3000;
      proxy_pass         $upstream_backend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location /health {
      set $upstream_backend http://backend:3000;
      proxy_pass $upstream_backend;
    }
  }

  # ─── Frontend (37-27-253-42.nip.io) ────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name 37-27-253-42.nip.io;

    ssl_certificate     /etc/letsencrypt/live/37-27-253-42.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/37-27-253-42.nip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Next.js static assets — долгий кэш
    location /_next/static/ {
      set $upstream_frontend http://frontend:3001;
      proxy_pass $upstream_frontend;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
      set $upstream_frontend http://frontend:3001;
      proxy_pass         $upstream_frontend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }
}
